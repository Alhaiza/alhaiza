<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#00F5FF" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030305" />
      <stop offset="100%" stop-color="#0b0c16" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#00F5FF" />
    </linearGradient>
    <filter id="glow-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="45" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="20" fill="url(#bg)" stroke="#1a1d36" stroke-width="1.5" />

  <!-- Decorative grid lines -->
  <g opacity="0.05">
    <path d="M 0,35 L 800,35 M 0,70 L 800,70 M 0,105 L 800,105 M 0,140 L 800,140 M 0,175 L 800,175 M 0,210 L 800,210 M 0,245 L 800,245" stroke="#FFFFFF" stroke-width="1" />
    <path d="M 50,0 L 50,280 M 100,0 L 100,280 M 150,0 L 150,280 M 200,0 L 200,280 M 250,0 L 250,280 M 300,0 L 300,280 M 350,0 L 350,280 M 400,0 L 400,280 M 450,0 L 450,280 M 500,0 L 500,280 M 550,0 L 550,280 M 600,0 L 600,280 M 650,0 L 650,280 M 700,0 L 700,280 M 750,0 L 750,280" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Glow effects -->
  <circle cx="160" cy="140" r="110" fill="#8A2BE2" opacity="0.18" filter="url(#glow-blur)" />
  <circle cx="640" cy="140" r="90" fill="#00F5FF" opacity="0.14" filter="url(#glow-blur)" />

  <!-- IDE Mockup Window on the right -->
  <g class="ide-window" transform="translate(540, 50)">
    <!-- Main Box -->
    <rect x="0" y="0" width="210" height="180" rx="20" fill="#06070c" stroke="url(#glow)" stroke-width="1.5" />
    
    <!-- Window Header -->
    <path d="M 0,20 A 20,20 0 0,1 20,0 L 190,0 A 20,20 0 0,1 210,20 L 210,35 L 0,35 Z" fill="#0b0d17" />
    <!-- Three Window Dots -->
    <circle cx="20" cy="17" r="5" fill="#FF5F56" />
    <circle cx="36" cy="17" r="5" fill="#FFBD2E" />
    <circle cx="52" cy="17" r="5" fill="#27C93F" />
    <!-- Tab File Name -->
    <text x="85" y="22" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#4B5563">Portfolio.js</text>
    
    <!-- Editor Code Lines -->
    <rect x="20" y="55" width="40" height="6" rx="3" fill="#E2E8F0" opacity="0.8" />
    <rect x="65" y="55" width="55" height="6" rx="3" fill="#FF007F" opacity="0.8" />
    <rect x="125" y="55" width="25" height="6" rx="3" fill="#00F5FF" opacity="0.8" />
    
    <rect x="35" y="75" width="50" height="6" rx="3" fill="#8A2BE2" opacity="0.8" />
    
    <rect x="50" y="95" width="70" height="6" rx="3" fill="#00F5FF" opacity="0.8" />
    
    <rect x="65" y="115" width="55" height="6" rx="3" fill="#FF3366" opacity="0.8" />
    <rect x="125" y="115" width="60" height="6" rx="3" fill="#FFBD2E" opacity="0.8" />
    
    <rect x="50" y="135" width="80" height="6" rx="3" fill="#00F5FF" opacity="0.8" />
    
    <rect x="35" y="155" width="20" height="6" rx="3" fill="#8A2BE2" opacity="0.8" />
  </g>

  <!-- Typography styles -->
  <style>
    @keyframes pulse-violet {
      0% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.05); }
      100% { opacity: 0.15; transform: scale(1); }
    }
    @keyframes pulse-cyan {
      0% { opacity: 0.12; transform: scale(1); }
      50% { opacity: 0.22; transform: scale(1.08); }
      100% { opacity: 0.12; transform: scale(1); }
    }
    @keyframes float-box {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    @keyframes accent-slide {
      0% { width: 0px; }
      100% { width: 60px; }
    }
    @keyframes text-fade {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0px); }
    }
    
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", "Inter", sans-serif;
      font-weight: 800;
      font-size: 34px;
      fill: #FFFFFF;
      letter-spacing: -0.75px;
      opacity: 0;
      animation: text-fade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.2s;
    }
    .role {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", "Inter", sans-serif;
      font-weight: 600;
      font-size: 19px;
      fill: url(#text-grad);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: text-fade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
    }
    .tagline {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", "Inter", sans-serif;
      font-weight: 400;
      font-size: 15px;
      fill: #8F9CAE;
      opacity: 0;
      animation: text-fade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.6s;
    }
    .glow-circle-1 {
      transform-origin: 160px 140px;
      animation: pulse-violet 8s ease-in-out infinite;
    }
    .glow-circle-2 {
      transform-origin: 640px 140px;
      animation: pulse-cyan 10s ease-in-out infinite;
    }
    .ide-window {
      transform-origin: 645px 140px;
      animation: float-box 6s ease-in-out infinite;
    }
    .accent-bar {
      fill: url(#glow);
      animation: accent-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>

  <!-- Text group -->
  <g transform="translate(60, 105)">
    <!-- Accent bar -->
    <rect class="accent-bar" x="0" y="-35" width="60" height="6" rx="3" />
    <text class="title" x="0" y="15">Syarif Muhammad Alhaiza</text>
    <text class="role" x="0" y="48">Fullstack Web Developer</text>
    <text class="tagline" x="0" y="78">Building practical and modern web applications.</text>
  </g>
</svg>
